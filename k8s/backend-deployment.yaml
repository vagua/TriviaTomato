apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspiration-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inspiration-backend
  template:
    metadata:
      labels:
        app: inspiration-backend
    spec:
      containers:
        - name: backend
          image: mybackend:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: LLM_URL
              value: http://llm-gateway:9000
          resources:       # <--- 這一塊一定要有，HPA 才能算
            requests:
              cpu: "20m"  # 範例：請求 0.2 顆核心
            limits:
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: inspiration-backend
spec:
  selector:
    app: inspiration-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: LoadBalancer
